    registry: [data/registries/risk-register]

  run-compliance-check:
    agents: [security-and-trust-reviewer, business-translator]
    frameworks: [security-by-design-primer]
    checklists: [security-review-quality, risk/compliance-verification-gate]
    templates: [security-review-template]
    registry: [data/registries/risk-register]

  prepare-environment:
    agents: [handoff-orchestrator, system-architect]
    frameworks: [environment-readiness-framework]
    checklists: [environment-readiness-quality, readiness/environment-readiness-gate]
